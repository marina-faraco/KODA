<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body>
     
    <!------ Navbar ------>

            <div class="logo">

            </div>
            <nav>

                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    </li>

                </ul>

<!------ Carrinho ------>
    <div class="container-cart">   
        <img class="background-cart-img" src="assets/home-background.jpg">
        <img class="xadrez" src="assets/xaderz.png">

        <div class="cart-wrapper">

            <!-- Entrega -->
            <div class="entrega-section">
                <img class="paper-bg" src="assets/paper-background.png">
                <div class="entrega-content">
                    <h1>ENTREGA</h1>
                    <form id="entrega-form" class="delivery-form active">
                        <button type="button" class="address-btn">Usar endereço atual</button>
                        <label>ou digite novo endereço</label>
                        <input id="input-rua" type="text" placeholder="Rua, número" required list="sugestoes-rua">
                        <datalist id="sugestoes-rua"></datalist>
                        <input type="text" placeholder="Complemento" required>
                        <input type="text" placeholder="Seu nome">
                    </form>

                    <form id="retirada-form" class="delivery-form">
                        <label>Nome do Cliente</label>
                        <input type="text" placeholder="Digite seu nome" required>
                    </form>

                    <div class="toggle">
                        <button id="retirada"><span class="toggle-indicator"></span></button>
                        <span class="toggle-label">RETIRADA</span>
                    </div>

                    <div id="retirada-popup" class="retirada-popup hidden">   
                        <div class="retirada-popup">
                            <h3>Nome para retirada</h3>
                            <input type="text" id="nome-retirada" placeholder="Digite seu nome">
                            <button onclick="confirmarRetirada()">ENVIAR</button>
                        </div>
                    </div>

                    <div class="confirmar-btn">
                        <button>CONFIRMAR</button>
                    </div>
                </div>
            </div>

            <div id="confirmacao-popup" class="confirmacao-popup hidden">
                <div class="popup-overlay" onclick="document.getElementById('confirmacao-popup').classList.add('hidden')"></div>
                <div class="popup-box">
                    <p id="confirmacao-msg"></p>
                </div>
            </div>

            <!-- Pagamento -->
            <div class="pagamento-section">
                <img class="quadro-bg" src="assets/quadro.png">

                <div class="pagamento-content">
                    <div class="items-list">
                        <h3>ITENS</h3>
                        <div id="cart-items"></div>
                    </div>    
                    <div class="totais">
                        <p>Subtotal: <span id="subtotal">R$ 0.00</span></p>
                        <p>TOTAL: <span id="total">R$ 0.00</span></p>
                    </div>
                </div>

                <div class="payment-btn">
                    <div class="pix-btn">
                        <button id="pix">PIX</button>
                    </div>
                    <div class="outro-btn">
                        <button id="outro">OUTRO</button>
                    </div>
                </div>

                <div id="pix-qr" class="pix-qr hidden">
                    <div class="popup-overlay" onclick="document.getElementById('pix-qr').classList.add('hidden')"></div>
                    <div class="popup-box">
                        <img src="assets/qr-code.png" alt="QR Code PIX">
                    </div>
                </div>

                <div id="payment-message" class="payment-message hidden">
                    <div class="popup-overlay" onclick="document.getElementById('payment-message').classList.add('hidden')"></div>
                    <div class="popup-box">
                        <p>A cobrança será realizada na hora da retirada/entrega</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

<!------ Footer ------>

<!------ JS For Toggle Menu ------>

    <script>
        var NavItems = document.getElementById("NavItems");

        function menutoggle() {
            if (NavItems.style.maxHeight == "0px") {
                NavItems.style.maxHeight = "200px";
            } else {
                NavItems.style.maxHeight = "0px";
            }
        }

        window.addEventListener("resize", function() {
            if (window.innerWidth > 800) {
                NavItems.style.maxHeight = "";
            }
        });  
    </script>

    <!--- Retirada Pop-Up --->

    <script>   
        var modoRetirada = false;
        var retiradaBtn = document.getElementById("retirada");

        retiradaBtn.addEventListener("click", function() {
            modoRetirada = !modoRetirada;

            if (modoRetirada) {
                retiradaBtn.style.background = "#327487";
                retiradaBtn.querySelector(".toggle-indicator").style.opacity = "1";
                document.querySelectorAll('#entrega-form input, #entrega-form button').forEach(function(el) {
                    el.disabled = true;
                    el.style.opacity = "0.4";
                    el.style.cursor = "not-allowed";
                });
                document.getElementById("retirada-popup").classList.remove("hidden");
            } else {
                retiradaBtn.style.background = "#2794B3";
                retiradaBtn.querySelector(".toggle-indicator").style.opacity = "0";
                document.querySelectorAll('#entrega-form input, #entrega-form button').forEach(function(el) {
                    el.disabled = false;
                    el.style.opacity = "1";
                    el.style.cursor = "pointer";
                });
            }
        });

        function confirmarRetirada() {
            var nome = document.getElementById("nome-retirada").value;
            if (nome.trim() === "") {
                alert("Digite seu nome para continuar");
                return;
            }
            document.getElementById("retirada-popup").classList.add("hidden");
        }

        document.getElementById("nome-retirada").addEventListener("keydown", function(e) {
            if (e.key === "Enter") confirmarRetirada();
        });
    </script>

    <!--- Pagamento Pop-Up --->

    <script>   
        document.getElementById("pix").addEventListener("click", function() {
            document.getElementById("pix-qr").classList.remove("hidden");
            document.getElementById("payment-message").classList.add("hidden");
        });

        document.getElementById("outro").addEventListener("click", function() {
            document.getElementById("payment-message").classList.remove("hidden");
            document.getElementById("pix-qr").classList.add("hidden");
        });

    </script>

    <!--- Carrinho --->

    <script>
        function carregarCarrinho() {
            var carrinho = JSON.parse(localStorage.getItem("carrinho") || "[]");
            var cartItems = document.getElementById("cart-items");
            var subtotalEl = document.getElementById("subtotal");
            var totalEl = document.getElementById("total");

            cartItems.innerHTML = "";

            if (carrinho.length === 0) {
                cartItems.innerHTML = "<p style='color:#2794B3'>Carrinho vazio</p>";
                subtotalEl.textContent = "R$ 0.00";
                totalEl.textContent = "R$ 0.00";
                return;
            }

            var subtotal = 0;

            carrinho.forEach(function(item, index) {
                var itemTotal = item.preco * item.quantidade;
                subtotal += itemTotal;

                var div = document.createElement("div");
                div.style.cssText = "display:flex; align-items:center; margin-bottom:5px; gap:4px;";
                div.innerHTML = "<span style='flex:1'>" + item.nome + " (" + item.quantidade + "x)</span><span style='color:#2794B3; min-width:55px; text-align:left;'>R$ " + itemTotal.toFixed(2) + "</span><span style='cursor:pointer; color:#FF3131;' onclick='removerItem(" + index + ")'>✕</span>";
                cartItems.appendChild(div);
            });

            subtotalEl.textContent = "R$ " + subtotal.toFixed(2);
            totalEl.textContent = "R$ " + subtotal.toFixed(2);
        }

        function removerItem(index) {
            var carrinho = JSON.parse(localStorage.getItem("carrinho") || "[]");
            carrinho.splice(index, 1);
            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            carregarCarrinho();
        }

        carregarCarrinho();
    </script>

        <!--- Pegar endereço atual --->

    <script>
        document.querySelector(".address-btn").addEventListener("click", function() {
            if (!navigator.geolocation) {
                alert("Geolocalização não suportada pelo seu browser");
                return;
            }

            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lon = position.coords.longitude;

                fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        var addr = data.address;

                        var rua = (addr.road || "") + (addr.house_number ? ", " + addr.house_number : "");
                        var complemento = [addr.suburb, addr.city_district, addr.city ||  addr.town, addr.village].filter(Boolean).join(", ");

                        document.querySelector('#entrega-form input[placeholder="Rua, número"]').value = rua;
                        document.querySelector('#entrega-form input[placeholder="Complemento"]').value = complemento;
                    })
                    .catch(function() {
                        alert("Não foi possível buscar o endereço");
                    });

            }, function() {
                alert("Permissão de localização negada");
            });
        });
    </script>
    
    <!--- Sugerir endereço --->

    <script>
        var inputRua = document.getElementById("input-rua");
        var sugestoesRua = document.getElementById("sugestoes-rua");
        var timer;

        inputRua.addEventListener("input", function() {
            clearTimeout(timer);
            var texto = inputRua.value;

            if (texto.length < 4) {
                sugestoesRua.innerHTML = "";
                return;
            }

            timer = setTimeout(function() {
                fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(texto) + "&addressdetails=1&limit=5")
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        sugestoesRua.innerHTML = "";
                        data.forEach(function(item) {
                            var option = document.createElement("option");
                            option.value = item.display_name;
                            sugestoesRua.appendChild(option);
                        });
                    });
            }, 500);
        });
    </script>

    <script>
        document.querySelector(".confirmar-btn button").addEventListener("click", function() {
    
        var nome = modoRetirada
            ? document.getElementById("nome-retirada").value
            : document.querySelector('#entrega-form input[placeholder="Seu nome"]').value;

        document.querySelectorAll('#entrega-form input, #entrega-form button, #retirada-form input').forEach(function(el) {
            el.disabled = true;
            el.style.opacity = "0.4";
            el.style.cursor = "not-allowed";
        });

        document.getElementById("retirada").disabled = true;
        document.getElementById("retirada").style.opacity = "0.4";
        document.getElementById("retirada").style.cursor = "not-allowed";

        document.querySelector(".confirmar-btn button").disabled = true;
        document.querySelector(".confirmar-btn button").style.opacity = "0.4";
        document.querySelector(".confirmar-btn button").style.cursor = "not-allowed";

        var msg = nome.trim() !== "" ? "Até daqui a pouco, " + nome + "! :)" : "Até daqui a pouco! :)";
        document.getElementById("confirmacao-msg").textContent = msg;
        document.getElementById("confirmacao-popup").classList.remove("hidden");
    });
    </script>

</body>
